<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>欣智樂 Kisunla 治療排程產生器</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.2/babel.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Noto Sans TC',system-ui,sans-serif;background:#f5f6f8}
    input:focus{border-color:#FF9224!important}
    input[type="date"],input[type="text"],input[type="number"],input[type="email"],input[type="url"]{-webkit-appearance:none;appearance:none;height:44px}
    button{transition:opacity .15s}button:active{opacity:.8}
    .date-cell{display:flex;align-items:center;gap:4px}
    .date-cell .date-text{font-size:13px;font-weight:500}
    .date-btn{position:relative;display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border:none;background:#f0f2f5;border-radius:6px;cursor:pointer;font-size:14px;flex-shrink:0}
    .date-btn:hover{background:#fef3e2}
    .date-btn input{position:absolute;top:0;left:0;width:100%;height:100%;opacity:0;cursor:pointer;border:none;font-size:16px}
    .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;max-width:90%}
    .toast.show{opacity:1}.toast.ok{background:#27ae60;color:#fff}.toast.err{background:#e74c3c;color:#fff}
    .file-input{display:none}
    .sticky-bar{position:sticky;bottom:0;background:#f5f6f8;padding:10px 14px 14px;border-top:1px solid #e5e5e5;z-index:10}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useMemo,useCallback,useRef}=React;
const TEMPLATE_COPY_URL="https://docs.google.com/spreadsheets/d/1_2ovVCjFA5IMb5HWb_gRmpW679x1dxZx46_wCSUtwTQ/copy";
const DEFAULT_GIFTS=new Set([6,12,13,17,18,19]);
const GIFT_REMIND_MAP={4:"第6次起",10:"第12次起",15:"第17次起"};
const MRI_BEFORE=new Set([2,3,4,7]);

function avoidWeekend(d){const date=new Date(d);const day=date.getDay();if(day===0)date.setDate(date.getDate()-2);if(day===6)date.setDate(date.getDate()-1);return date;}

function generateSchedule(firstDate,mriDays,startDose=1,totalDoses=19,giftSet=null){
  const gifts=giftSet||DEFAULT_GIFTS;
  const events=[],start=new Date(firstDate+"T00:00:00"),db=parseInt(mriDays)||7;
  const endDose=startDose+totalDoses-1;
  for(let i=0;i<totalDoses;i++){
    const dn=startDose+i,wk=(dn-1)*4;
    const infDate=new Date(start);infDate.setDate(infDate.getDate()+i*28);
    if(MRI_BEFORE.has(dn)){
      let md=new Date(infDate);md.setDate(md.getDate()-db);md=avoidWeekend(md);
      events.push({id:`mri-${dn}`,type:"mri",label:`MRI（第${dn}次輸注前）`,week:`W${wk}`,date:md,startHour:9,startMin:0,endHour:11,endMin:0,doseRef:dn,edited:false,isGift:false,giftRemind:"",isPauseMRI:false});
    }
    const remindDoses=new Set([4,10,15]);
    let giftRemind="";
    if(remindDoses.has(dn)&&GIFT_REMIND_MAP[dn])giftRemind=`🎁 提醒：請於第${dn+1}次回診時辦理${GIFT_REMIND_MAP[dn]}贈藥手續`;
    events.push({id:`inf-${dn}`,type:"infusion",label:`第${dn}次輸注`,week:`W${wk}`,date:infDate,doseNumber:dn,startHour:12,startMin:0,endHour:dn<=3?15:14,endMin:0,edited:false,isGift:gifts.has(dn),giftRemind,isPauseMRI:false,vials:dn<=3?dn:4});
  }
  events.sort((a,b)=>a.date-b.date);return events;
}

function formatDate(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function formatDateTW(d){const w=["日","一","二","三","四","五","六"][d.getDay()];return`${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} (${w})`;}
function toICS(d,h,m){return`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}T${String(h).padStart(2,"0")}${String(m).padStart(2,"0")}00`;}

function generateICS(events,name){
  const l=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//Kisunla//TW//","CALSCALE:GREGORIAN","METHOD:PUBLISH",`X-WR-CALNAME:${name||"患者"} - Kisunla 治療排程`,"X-WR-TIMEZONE:Asia/Taipei"];
  events.forEach((ev,i)=>{const s=ev.type==="infusion"?`Kisunla ${ev.label}${ev.isGift?" (贈藥)":""}`:ev.isPauseMRI?`追蹤 MRI（暫停期間）`:ev.label;l.push("BEGIN:VEVENT",`DTSTART;TZID=Asia/Taipei:${toICS(ev.date,ev.startHour,ev.startMin)}`,`DTEND;TZID=Asia/Taipei:${toICS(ev.date,ev.endHour,ev.endMin)}`,`SUMMARY:${s}`);if(name)l.push(`DESCRIPTION:患者: ${name}`);l.push(`UID:kisunla-${ev.id}-${Date.now()}@scheduler`,"END:VEVENT");});
  l.push("END:VCALENDAR");return l.join("\r\n");
}

function genPatientExcel(events,name,firstDate,mriDays,hospital,hcp,caseNo){
  const hd=[["Kisunla (Donanemab) 欣智樂 治療排程表"],[`醫院: ${hospital||"—"}　HCP: ${hcp||"—"}　Case: ${caseNo||"—"}`],[`患者姓名: ${name||"—"}`],[`首次治療日: ${firstDate}`],[`MRI: 輸注前 ${mriDays} 天（避開週末）`],[`製表日期: ${formatDate(new Date())}`],[],["序號","週次","日期","星期","類型","項目","贈藥","藥瓶數","備註"]];
  let s=0;const rows=events.map(ev=>{s++;const w=["日","一","二","三","四","五","六"][ev.date.getDay()];return[s,ev.week||"—",formatDate(ev.date),w,ev.type==="infusion"?"輸注":"MRI",ev.isPauseMRI?"追蹤 MRI（暫停期間）":ev.label,ev.isGift?"🎁 贈藥":"",ev.vials||"",ev.edited?"⚠ 已調整":ev.giftRemind||""];});
  const ws=XLSX.utils.aoa_to_sheet([...hd,...rows]);ws["!cols"]=[{wch:6},{wch:6},{wch:12},{wch:5},{wch:6},{wch:22},{wch:8},{wch:8},{wch:30}];ws["!merges"]=[{s:{r:0,c:0},e:{r:0,c:8}}];return ws;
}

function genAllPatientsExcel(patients){
  const wb=XLSX.utils.book_new();const SL={"active":"🟢 治療中","paused":"🟡 暫停用藥","completed":"✅ 清除完成"};
  const sumData=[["Kisunla 欣智樂 全患者排程總表"],[`製表日期: ${formatDate(new Date())}`],[],["編號","醫院","HCP","Case","患者姓名","狀態","首次治療日","已完成","總次數","下次排程日","下次項目","備註"]];
  patients.forEach((p,i)=>{if(!p.firstDate)return;const now=new Date();now.setHours(0,0,0,0);const st=p.status||"active";const next=st==="active"?p.events.find(ev=>ev.date>=now):null;const id2=st==="completed"&&p.completedAfterDose?p.completedAfterDose:st==="paused"&&p.pausedAfterDose?p.pausedAfterDose:p.events.filter(e=>e.type==="infusion"&&e.date<now).length;const it=p.events.filter(e=>e.type==="infusion").length;sumData.push([i+1,p.hospital||"",p.hcp||"",p.caseNo||"",p.name||`患者${i+1}`,SL[st],p.firstDate,id2,it,next?formatDate(next.date):"—",next?next.label:"—",p.notes||""]);});
  const sws=XLSX.utils.aoa_to_sheet(sumData);sws["!cols"]=[{wch:6},{wch:8},{wch:10},{wch:8},{wch:12},{wch:14},{wch:12},{wch:6},{wch:6},{wch:12},{wch:20},{wch:20}];sws["!merges"]=[{s:{r:0,c:0},e:{r:0,c:11}}];
  XLSX.utils.book_append_sheet(wb,sws,"總覽");

  // Forecast sheet: monthly vial count by hospital
  const forecastData=[["Kisunla 每月用量預測（藥瓶數）"],[`製表日期: ${formatDate(new Date())}`],[]];
  const monthMap={};const hospitals=new Set();
  patients.forEach(p=>{if(!p.firstDate||p.status==="completed")return;p.events.forEach(ev=>{if(ev.type!=="infusion"||!ev.vials)return;const m=formatDate(ev.date).substring(0,7);const h=p.hospital||"未分類";hospitals.add(h);if(!monthMap[m])monthMap[m]={};monthMap[m][h]=(monthMap[m][h]||0)+ev.vials;});});
  const hospArr=[...hospitals].sort();const months=Object.keys(monthMap).sort();
  forecastData.push(["月份",...hospArr,"合計"]);
  months.forEach(m=>{const row=[m];let total=0;hospArr.forEach(h=>{const v=monthMap[m]?.[h]||0;row.push(v);total+=v;});row.push(total);forecastData.push(row);});
  const fws=XLSX.utils.aoa_to_sheet(forecastData);fws["!cols"]=[{wch:10},...hospArr.map(()=>({wch:8})),{wch:8}];fws["!merges"]=[{s:{r:0,c:0},e:{r:0,c:hospArr.length+1}}];
  XLSX.utils.book_append_sheet(wb,fws,"月用量預測");

  patients.forEach((p,i)=>{if(!p.firstDate)return;XLSX.utils.book_append_sheet(wb,genPatientExcel(p.events,p.name,p.firstDate,p.mriDays,p.hospital,p.hcp,p.caseNo),(p.name||(p.hospital||"")+p.caseNo||`患者${i+1}`).substring(0,31));});
  return wb;
}

function dlFile(c,f,t){const b=new Blob([c],{type:t});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=f;a.click();URL.revokeObjectURL(u);}
async function postAllToSheet(url,email,patients){if(!url)return;try{await fetch(url,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify({email,patients:patients.filter(p=>p.firstDate).map(p=>({patientName:p.name||"未填",hospital:p.hospital||"",hcp:p.hcp||"",caseNo:p.caseNo||"",notes:p.notes||"",firstDate:p.firstDate,mriDaysBefore:p.mriDays,status:p.status||"active",events:p.events.map(ev=>({type:ev.type,label:ev.isPauseMRI?"追蹤MRI(暫停)":ev.label,date:formatDate(ev.date),isGift:ev.isGift||false,vials:ev.vials||0}))})),createdAt:new Date().toISOString()})});}catch(e){console.error(e);}}

function serializeData(patients,scriptUrl,email){
  return JSON.stringify({version:4,exportedAt:new Date().toISOString(),scriptUrl,email,
    patients:patients.map(p=>({id:p.id,name:p.name,hospital:p.hospital||"",hcp:p.hcp||"",caseNo:p.caseNo||"",notes:p.notes||"",firstDate:p.firstDate,mriDays:p.mriDays,filter:p.filter,status:p.status||"active",pausedAfterDose:p.pausedAfterDose||null,pausedDate:p.pausedDate||null,completedAfterDose:p.completedAfterDose||null,completedDate:p.completedDate||null,
      events:p.events.map(ev=>({id:ev.id,type:ev.type,label:ev.label,week:ev.week,date:formatDate(ev.date),startHour:ev.startHour,startMin:ev.startMin,endHour:ev.endHour,endMin:ev.endMin,doseRef:ev.doseRef,doseNumber:ev.doseNumber,edited:ev.edited,isGift:ev.isGift||false,giftRemind:ev.giftRemind||"",isPauseMRI:ev.isPauseMRI||false,vials:ev.vials||0}))
    }))},null,2);
}
function deserializeData(json){const d=JSON.parse(json);return{scriptUrl:d.scriptUrl||"",email:d.email||"",patients:d.patients.map(p=>({...p,hospital:p.hospital||"",hcp:p.hcp||"",caseNo:p.caseNo||"",notes:p.notes||"",status:p.status||"active",pausedAfterDose:p.pausedAfterDose||null,pausedDate:p.pausedDate||null,completedAfterDose:p.completedAfterDose||null,completedDate:p.completedDate||null,events:p.events.map(ev=>({...ev,date:new Date(ev.date+"T00:00:00"),isGift:ev.isGift||false,giftRemind:ev.giftRemind||"",isPauseMRI:ev.isPauseMRI||false,vials:ev.vials||(ev.type==="infusion"?(ev.doseNumber<=3?ev.doseNumber:4):0)}))}))};}

function Badge({type,pause}){if(pause)return<span style={{display:"inline-block",padding:"2px 8px",borderRadius:4,fontSize:11,fontWeight:600,whiteSpace:"nowrap",color:"#e65100",background:"#fff3e0"}}>🔍 追蹤MRI</span>;const i=type==="infusion";return<span style={{display:"inline-block",padding:"2px 8px",borderRadius:4,fontSize:11,fontWeight:600,whiteSpace:"nowrap",color:i?"#1a5276":"#fff",background:i?"#d4e6f1":"#8E8E8E"}}>{i?"💉 輸注":"🧠 MRI"}</span>;}
function StatusBadge({status}){const m={"active":{l:"🟢 治療中",bg:"#e8f8f5",c:"#1a7a5a"},"paused":{l:"🟡 暫停用藥",bg:"#fef9e7",c:"#7d6608"},"completed":{l:"✅ 清除完成",bg:"#eaf2e8",c:"#2e7d32"}};const s=m[status]||m.active;return<span style={{display:"inline-block",padding:"2px 10px",borderRadius:12,fontSize:11,fontWeight:600,background:s.bg,color:s.c}}>{s.l}</span>;}
function Toast({msg,type,show}){return<div className={`toast ${type} ${show?"show":""}`}>{msg}</div>;}
function createPatient(id){return{id,name:"",hospital:"",hcp:"",caseNo:"",notes:"",firstDate:"",mriDays:"7",events:[],filter:"all",status:"active",pausedAfterDose:null,pausedDate:null,completedAfterDose:null,completedDate:null};}
function getNextEvent(events){const n=new Date();n.setHours(0,0,0,0);return events.find(ev=>ev.date>=n&&!ev.isPauseMRI)||null;}

function ProgressBar({events,status,completedAfterDose,pausedAfterDose}){
  let inf=events.filter(e=>e.type==="infusion");
  if(status==="completed"&&completedAfterDose)inf=inf.filter(e=>e.doseNumber<=completedAfterDose);
  return(<div style={{display:"flex",gap:3,alignItems:"center",flexWrap:"wrap"}}>
    {inf.map((ev,i)=>{
      let done=false;
      if(status==="completed")done=true;
      else if(status==="paused"&&pausedAfterDose)done=ev.doseNumber<=pausedAfterDose;
      else{const now=new Date();now.setHours(0,0,0,0);done=ev.date<now;}
      let bg="#ddd";
      if(status==="completed")bg="#2e7d32";
      else if(status==="paused")bg=done?"#e07800":"#eee";
      else bg=done?"#FFA042":"#ddd";
      if(ev.isGift)bg=done?(status==="completed"?"#6a1b9a":"#9c27b0"):"#e1bee7";
      return<div key={i} style={{width:ev.isGift?14:10,height:ev.isGift?14:10,borderRadius:ev.isGift?3:10,background:bg,flexShrink:0}} title={`${ev.label}${ev.isGift?" (贈藥)":""} ${formatDate(ev.date)}`}/>;
    })}
  </div>);
}

// ============ GUIDE PAGE ============
function GuidePage(){
  const[gt,setGt]=useState("basic");
  return(<div style={{maxWidth:700,margin:"0 auto",padding:"16px 14px 40px"}}>
    <h2 style={{fontSize:17,fontWeight:700,color:"#333",marginBottom:12}}>📖 操作指南</h2>
    <div style={{display:"flex",marginBottom:16,background:"#e5e8eb",borderRadius:8,padding:3}}>
      {[{k:"basic",l:"📅 基本功能"},{k:"adv",l:"📧 進階：Email 提醒"}].map(t=>(<button key={t.k} onClick={()=>setGt(t.k)} style={{flex:1,padding:"8px 12px",border:"none",borderRadius:6,fontSize:13,fontWeight:gt===t.k?700:400,cursor:"pointer",background:gt===t.k?"#fff":"transparent",color:gt===t.k?"#e07800":"#777"}}>{t.l}</button>))}
    </div>
    {gt==="basic"?(<>
      <p style={{fontSize:13,color:"#666",marginBottom:16,lineHeight:1.7}}>不需要任何設定，打開網頁就能使用。</p>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        {[{i:"1️⃣",t:"新增患者",d:"點「📅 排程編輯」→ 輸入患者姓名、首次治療日、MRI 提前天數 → 排程自動產生。"},{i:"2️⃣",t:"調整排程",d:"點擊日期可手動修改。贈藥標記（🎁）可點擊切換。遇副作用暫停按「🟡 暫停用藥」；清除完成按「✅ 清除完成」。"},{i:"3️⃣",t:"暫停與恢復",d:"暫停用藥時可選擇暫停日期，暫停期間可新增追蹤 MRI。恢復用藥時輸入新治療日，系統自動從暫停處接續排程。"},{i:"4️⃣",t:"下載給患者",d:"各患者排程頁面可下載 .ics 日曆檔和 Excel 表格。"},{i:"5️⃣",t:"儲存並匯出",d:"「📋 患者總覽」→「💾 儲存並匯出」→ 同時下載 JSON（下次匯入用）+ 全患者 Excel 總表（留檔用）。"},{i:"6️⃣",t:"下次使用",d:"開網頁 → 匯入上次的 JSON → 所有資料恢復，繼續操作。"}
        ].map((s,i)=>(<div key={i} style={{background:"#fff",borderRadius:10,padding:"14px 16px",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}><div style={{fontSize:14,fontWeight:700,marginBottom:4,color:"#333"}}>{s.i} {s.t}</div><div style={{fontSize:13,color:"#666",lineHeight:1.6}}>{s.d}</div></div>))}
      </div>
      <div style={{marginTop:16,padding:"12px 16px",background:"#e8f4fd",borderRadius:8,fontSize:12,color:"#1a5276",lineHeight:1.7}}>💡 每次操作完請記得「💾 儲存並匯出」並保留最新 JSON 檔。<br/>🎁 紫色方塊 = 贈藥次數，可點擊切換。系統在第 4、10、15 次輸注時自動提醒辦理贈藥手續。</div>
    </>):(<>
      <p style={{fontSize:13,color:"#666",marginBottom:12,lineHeight:1.7}}>設定後排程前 <b>3 天</b>、<b>1 天</b>、<b>當天</b>自動寄 Email 提醒。不設定也能正常使用。</p>
      <p style={{fontSize:13,fontWeight:600,color:"#e07800",marginBottom:16}}>⚠ 以下步驟只需做一次。</p>
      <a href={TEMPLATE_COPY_URL} target="_blank" rel="noopener noreferrer" style={{display:"block",textAlign:"center",padding:"14px 20px",background:"#FF9224",color:"#fff",border:"none",borderRadius:10,fontSize:15,fontWeight:700,textDecoration:"none",marginBottom:20,boxShadow:"0 2px 8px rgba(255,146,36,0.3)"}}>📋 Step 1：複製 Google Sheet 模板</a>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        {[{i:"1️⃣",t:"複製模板",d:"點上方按鈕，Google 自動建立副本到你的雲端硬碟。"},{i:"2️⃣",t:"進入 Apps Script",d:"開副本 →「擴充功能」→「Apps Script」。"},{i:"3️⃣",t:"新增部署",d:"右上角「部署」→「新增部署」→ 齒輪選「網頁應用程式」。"},{i:"4️⃣",t:"設定權限",d:"執行身分「自己」、存取權限「所有人」→ 按「部署」→ 允許授權。"},{i:"5️⃣",t:"複製 URL",d:"複製 https://script.google.com/macros/s/.../exec 格式網址。"},{i:"6️⃣",t:"設定觸發條件",d:"左側「⏰ 觸發條件」→「新增」→ 函式 sendDailyReminders → 時間驅動 → 日計時器 → 上午 8-9 點 → 儲存。"},{i:"7️⃣",t:"填入網頁",d:"「📅 排程編輯」→「⚙️ 進階設定」→ 貼 URL + 填 Email → 完成！"}
        ].map((s,i)=>(<div key={i} style={{background:"#fff",borderRadius:10,padding:"14px 16px",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}><div style={{fontSize:14,fontWeight:700,marginBottom:4,color:"#333"}}>{s.i} {s.t}</div><div style={{fontSize:13,color:"#666",lineHeight:1.6}}>{s.d}</div></div>))}
      </div>
      <div style={{marginTop:16,padding:"12px 16px",background:"#e8f8f5",borderRadius:8,fontSize:12,color:"#1a7a5a",lineHeight:1.7}}>✅ 每次「💾 儲存並匯出」時自動同步到 Google Sheet。URL 和 Email 存在 JSON 裡，匯入後不需重填。</div>
    </>)}
  </div>);
}

// ============ OVERVIEW PAGE ============
function OverviewPage({patients,onSelect,onAdd,onSaveJSON,onExportExcel,onImport,fileRef}){
  const[sf,setSf]=useState("all");
  const[monthFilter,setMonthFilter]=useState("all");
  const hasData=patients.filter(p=>p.firstDate).length>0;

  // Get unique months from firstDate
  const months=useMemo(()=>{
    const ms=new Set();patients.forEach(p=>{if(p.firstDate)ms.add(p.firstDate.substring(0,7));});
    return Array.from(ms).sort();
  },[patients]);

  // Filter and sort
  const shown=useMemo(()=>{
    let list=patients.filter(p=>p.firstDate);
    if(sf!=="all")list=list.filter(p=>(p.status||"active")===sf);
    if(monthFilter!=="all")list=list.filter(p=>p.firstDate.startsWith(monthFilter));
    list.sort((a,b)=>a.firstDate.localeCompare(b.firstDate));
    return list;
  },[patients,sf,monthFilter]);

  // Upcoming 7 days
  const upcoming7=useMemo(()=>{
    const now=new Date();now.setHours(0,0,0,0);
    const end=new Date(now);end.setDate(end.getDate()+7);
    const items=[];
    patients.forEach(p=>{
      if(!p.firstDate||(p.status||"active")!=="active")return;
      p.events.forEach(ev=>{
        if(ev.date>=now&&ev.date<end){
          items.push({date:ev.date,name:p.name||"未命名",type:ev.type,label:ev.label,isGift:ev.isGift,giftRemind:ev.giftRemind||"",isPauseMRI:ev.isPauseMRI});
        }
      });
    });
    items.sort((a,b)=>a.date-b.date);
    return items;
  },[patients]);

  const counts={all:patients.filter(p=>p.firstDate).length,active:patients.filter(p=>p.firstDate&&(p.status||"active")==="active").length,paused:patients.filter(p=>p.firstDate&&p.status==="paused").length,completed:patients.filter(p=>p.firstDate&&p.status==="completed").length};

  return(<div style={{maxWidth:700,margin:"0 auto",padding:"16px 14px 100px"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8}}>
      <h2 style={{fontSize:17,fontWeight:700,color:"#333"}}>📋 患者總覽</h2>
      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        <select value={monthFilter} onChange={e=>setMonthFilter(e.target.value)} style={{padding:"6px 10px",border:"1.5px solid #ddd",borderRadius:8,fontSize:12,color:"#666",background:"#fff",cursor:"pointer",height:36}}>
          <option value="all">全部月份</option>
          {months.map(m=><option key={m} value={m}>{m}</option>)}
        </select>
        <button onClick={onAdd} style={{padding:"8px 16px",background:"#FF9224",color:"#fff",border:"none",borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer",height:36}}>+ 新增患者</button>
      </div>
    </div>

    {/* Upcoming 7 days */}
    {hasData&&(<div style={{background:"#fff",borderRadius:10,padding:"14px 18px",marginBottom:14,boxShadow:"0 1px 3px rgba(0,0,0,0.06)",borderLeft:"4px solid #2874a6"}}>
      <div style={{fontSize:14,fontWeight:700,color:"#1a5276",marginBottom:10}}>📢 近 7 天排程</div>
      {upcoming7.length===0?(<div style={{fontSize:13,color:"#27ae60",fontWeight:500}}>✅ 近 7 天無排程</div>):(
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {upcoming7.map((item,i)=>(<div key={i} style={{display:"flex",alignItems:"center",gap:8,fontSize:13,flexWrap:"wrap"}}>
            <span style={{fontWeight:600,color:"#1a5276",minWidth:110}}>{formatDateTW(item.date)}</span>
            <span style={{fontWeight:500,color:"#333"}}>{item.name}</span>
            <Badge type={item.type} pause={item.isPauseMRI}/>
            <span style={{color:"#666"}}>{item.isPauseMRI?"追蹤 MRI（暫停期間）":item.label}</span>
            {item.isGift&&<span style={{fontSize:11,color:"#9c27b0",fontWeight:600}}>🎁 贈藥</span>}
            {item.giftRemind&&<span style={{fontSize:11,color:"#9c27b0",fontWeight:500}}>{item.giftRemind}</span>}
          </div>))}
        </div>
      )}
    </div>)}

    {hasData&&(<div style={{display:"flex",marginBottom:12,background:"#e5e8eb",borderRadius:8,padding:3,flexWrap:"wrap"}}>
      {[{k:"all",l:`全部(${counts.all})`},{k:"active",l:`治療中(${counts.active})`},{k:"paused",l:`暫停(${counts.paused})`},{k:"completed",l:`完成(${counts.completed})`}].map(t=>(<button key={t.k} onClick={()=>setSf(t.k)} style={{flex:1,padding:"6px 8px",border:"none",borderRadius:6,fontSize:12,fontWeight:sf===t.k?700:400,cursor:"pointer",background:sf===t.k?"#fff":"transparent",color:sf===t.k?"#e07800":"#777",minWidth:60}}>{t.l}</button>))}
    </div>)}

    {!hasData?(
      <div style={{textAlign:"center",padding:"50px 20px",color:"#bbb"}}>
        <div style={{fontSize:36,marginBottom:10}}>👤</div>
        <div style={{fontSize:14,marginBottom:16}}>尚無患者資料，請新增患者或匯入資料檔</div>
        <button onClick={()=>fileRef.current&&fileRef.current.click()} style={{padding:"10px 20px",background:"#fff",border:"1.5px solid #FF9224",borderRadius:8,fontSize:13,fontWeight:600,color:"#FF9224",cursor:"pointer"}}>📂 匯入患者資料 (.json)</button>
      </div>
    ):(
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {shown.map((p,idx)=>{
          if(!p.firstDate)return null;
          const st=p.status||"active";
          const next=st==="active"?getNextEvent(p.events):null;
          const infDone=p.events.filter(e=>e.type==="infusion"&&e.date<new Date()).length;
          const infTotal=p.events.filter(e=>e.type==="infusion").length;
          const edited=p.events.filter(e=>e.edited).length;
          const nearGift=st==="active"&&p.events.find(ev=>ev.giftRemind&&ev.date>=new Date()&&ev.date<=new Date(Date.now()+28*86400000));
          return(<div key={p.id} onClick={()=>onSelect(p.id)} style={{background:"#fff",borderRadius:10,padding:"16px 18px",boxShadow:"0 1px 3px rgba(0,0,0,0.06)",cursor:"pointer",borderLeft:`4px solid ${st==="completed"?"#2e7d32":st==="paused"?"#FFFF37":"#FFA042"}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:16,fontWeight:700,color:"#333"}}>{p.hospital?`${p.hospital} `:""}{p.hcp?`${p.hcp} `:""}{p.caseNo||p.name||`患者 ${idx+1}`}</span><StatusBadge status={st}/></div>
              <div style={{fontSize:11,color:"#999"}}>{p.firstDate}</div>
            </div>
            <div style={{marginBottom:8}}><ProgressBar events={p.events} status={st} completedAfterDose={p.completedAfterDose} pausedAfterDose={p.pausedAfterDose}/></div>
            <div style={{display:"flex",gap:14,fontSize:12,color:"#666",flexWrap:"wrap"}}>
              <div><span style={{color:"#999"}}>進度</span> <span style={{fontWeight:600,color:"#e07800"}}>{st==="completed"&&p.completedAfterDose?`${p.completedAfterDose}/${p.completedAfterDose}`:st==="paused"&&p.pausedAfterDose?`${p.pausedAfterDose}/${infTotal}`:`${infDone}/${infTotal}`}</span></div>
              {next&&<div><span style={{color:"#999"}}>下次</span> <span style={{fontWeight:600}}>{formatDateTW(next.date)}</span> <Badge type={next.type}/></div>}
              {st==="paused"&&p.pausedDate&&<div style={{color:"#7d6608"}}>暫停於 {p.pausedDate}</div>}
              {st==="completed"&&<div style={{color:"#2e7d32"}}>{p.completedAfterDose?`第 ${p.completedAfterDose} 次後完成`:""}{p.completedDate?` · ${p.completedDate}`:""}</div>}
              {edited>0&&<div style={{color:"#e07800"}}>✎ {edited} 筆已調整</div>}
              {nearGift&&<div style={{color:"#9c27b0",fontWeight:600}}>🎁 即將進入贈藥階段</div>}
            </div>
          </div>);
        })}
      </div>
    )}
    <input ref={fileRef} type="file" accept=".json" className="file-input" onChange={onImport}/>

    {hasData&&(<div className="sticky-bar"><div style={{maxWidth:700,margin:"0 auto",display:"flex",gap:8}}>
      <button onClick={onSaveJSON} style={{flex:1,padding:"12px 10px",background:"#FF9224",color:"#fff",border:"none",borderRadius:8,fontSize:13,fontWeight:700,cursor:"pointer"}}>💾 儲存資料</button>
      <button onClick={onExportExcel} style={{flex:1,padding:"12px 10px",background:"#1e8449",color:"#fff",border:"none",borderRadius:8,fontSize:13,fontWeight:700,cursor:"pointer"}}>📊 匯出總表</button>
      <button onClick={()=>fileRef.current&&fileRef.current.click()} style={{flex:1,padding:"12px 10px",background:"#fff",color:"#FF9224",border:"1.5px solid #FF9224",borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer"}}>📂 匯入資料</button>
    </div></div>)}
  </div>);
}

// ============ SCHEDULE PAGE ============
function SchedulePage({patient:p,updatePatient,updateEventDate,onBack,onRemove,canRemove,scriptUrl,email,setScriptUrl,setEmail,showToast,onPause,onResume,onComplete,onToggleGift,onAddPauseMRI,onUndoPause}){
  const events=p.events,st=p.status||"active";
  const filtered=p.filter==="all"?events:p.filter==="pauseMRI"?events.filter(e=>e.isPauseMRI):events.filter(e=>e.type===p.filter&&!e.isPauseMRI);
  const infCount=events.filter(e=>e.type==="infusion").length;
  const mriCount=events.filter(e=>e.type==="mri"&&!e.isPauseMRI).length;
  const pauseMRICount=events.filter(e=>e.isPauseMRI).length;
  const lastEv=events.length?events[events.length-1]:null;
  const[showSettings,setShowSettings]=useState(false);
  const[resumeDate,setResumeDate]=useState("");
  const[showResume,setShowResume]=useState(false);
  const[pauseDate,setPauseDate]=useState(formatDate(new Date()));
  const[pauseDose,setPauseDose]=useState("");
  const[showPauseForm,setShowPauseForm]=useState(false);
  const[showCompleteForm,setShowCompleteForm]=useState(false);
  const[completeDate,setCompleteDate]=useState(formatDate(new Date()));
  const[completeDose,setCompleteDose]=useState("");
  const[newMRIDate,setNewMRIDate]=useState("");
  const[showGiftPanel,setShowGiftPanel]=useState(false);
  const[showDeleteConfirm,setShowDeleteConfirm]=useState(false);
  const[showRestoreConfirm,setShowRestoreConfirm]=useState(false);
  const[showUndoPause,setShowUndoPause]=useState(false);

  // Auto-calculate dose from date
  const calcDoseFromDate=(dateStr)=>{
    if(!dateStr)return 0;
    const d=new Date(dateStr+"T00:00:00");
    const infusions=events.filter(e=>e.type==="infusion"&&!e.isPauseMRI);
    let dose=0;
    for(const ev of infusions){if(ev.date<=d)dose=ev.doseNumber||dose;}
    return dose;
  };

  const now2=new Date();now2.setHours(0,0,0,0);
  const currentDose=events.filter(e=>e.type==="infusion"&&e.date<now2).length;

  const handleICS=()=>{if(!events.length)return;dlFile(generateICS(events,p.name),`Kisunla_${p.name||"patient"}.ics`,"text/calendar;charset=utf-8");};
  const handleXLSX=()=>{if(!events.length)return;const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,genPatientExcel(events,p.name,p.firstDate,p.mriDays),"治療排程");XLSX.writeFile(wb,`Kisunla_${p.name||"patient"}.xlsx`);};
  const is={width:"100%",padding:"9px 11px",border:"1.5px solid #d5d8dc",borderRadius:6,fontSize:15,boxSizing:"border-box",outline:"none"};

  return(<div style={{maxWidth:700,margin:"0 auto",padding:"16px 14px 40px"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
      <button onClick={onBack} style={{padding:"6px 14px",background:"none",border:"1.5px solid #ddd",borderRadius:8,fontSize:13,color:"#888",cursor:"pointer"}}>← 返回總覽</button>
      {canRemove&&!showDeleteConfirm&&<button onClick={()=>setShowDeleteConfirm(true)} style={{padding:"6px 14px",background:"none",border:"1.5px solid #e74c3c",borderRadius:8,fontSize:12,color:"#e74c3c",cursor:"pointer"}}>🗑 刪除</button>}
      {showDeleteConfirm&&<div style={{display:"flex",gap:6,alignItems:"center"}}><span style={{fontSize:12,color:"#e74c3c"}}>確定刪除？</span><button onClick={()=>{onRemove(p.id);setShowDeleteConfirm(false);}} style={{padding:"5px 12px",background:"#e74c3c",border:"none",borderRadius:6,fontSize:12,fontWeight:600,color:"#fff",cursor:"pointer"}}>確定</button><button onClick={()=>setShowDeleteConfirm(false)} style={{padding:"5px 12px",background:"#eee",border:"none",borderRadius:6,fontSize:12,color:"#888",cursor:"pointer"}}>取消</button></div>}
    </div>

    {/* Status bar */}
    <div style={{background:"#fff",borderRadius:10,padding:"14px 18px",marginBottom:14,boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10,marginBottom:10}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:15,fontWeight:700}}>{p.name||"未命名"}</span><StatusBadge status={st}/></div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {st==="active"&&<>
            <button onClick={()=>{setPauseDose(String(currentDose));setShowPauseForm(true);}} style={{padding:"5px 12px",background:"#fef9e7",border:"1.5px solid #f9a825",borderRadius:6,fontSize:12,fontWeight:600,color:"#7d6608",cursor:"pointer"}}>🟡 暫停用藥</button>
            <button onClick={()=>{setCompleteDose(String(currentDose));setShowCompleteForm(true);}} style={{padding:"5px 12px",background:"#e8f5e9",border:"1.5px solid #2e7d32",borderRadius:6,fontSize:12,fontWeight:600,color:"#2e7d32",cursor:"pointer"}}>✅ 清除完成</button>
          </>}
          {st==="paused"&&!showResume&&<>
            <button onClick={()=>setShowResume(true)} style={{padding:"5px 12px",background:"#e8f4fd",border:"1.5px solid #2874a6",borderRadius:6,fontSize:12,fontWeight:600,color:"#1a5276",cursor:"pointer"}}>🔄 恢復用藥</button>
            {!showUndoPause?<button onClick={()=>setShowUndoPause(true)} style={{padding:"5px 12px",background:"#f5f5f5",border:"1.5px solid #999",borderRadius:6,fontSize:12,color:"#666",cursor:"pointer"}}>↩ 撤銷暫停</button>
            :<div style={{display:"flex",gap:6,alignItems:"center"}}><span style={{fontSize:12,color:"#666"}}>確定撤銷？排程將重建</span><button onClick={()=>{onUndoPause(p.id);setShowUndoPause(false);}} style={{padding:"5px 10px",background:"#e07800",border:"none",borderRadius:6,fontSize:12,fontWeight:600,color:"#fff",cursor:"pointer"}}>確定</button><button onClick={()=>setShowUndoPause(false)} style={{padding:"5px 10px",background:"#eee",border:"none",borderRadius:6,fontSize:12,color:"#888",cursor:"pointer"}}>取消</button></div>}
          </>}
          {st==="completed"&&!showRestoreConfirm&&<button onClick={()=>setShowRestoreConfirm(true)} style={{padding:"5px 12px",background:"#f5f5f5",border:"1.5px solid #999",borderRadius:6,fontSize:12,color:"#666",cursor:"pointer"}}>↩ 恢復治療中</button>}
          {st==="completed"&&showRestoreConfirm&&<div style={{display:"flex",gap:6,alignItems:"center"}}><span style={{fontSize:12,color:"#666"}}>確定恢復？</span><button onClick={()=>{updatePatient(p.id,{status:"active",completedAfterDose:null,completedDate:null});setShowRestoreConfirm(false);}} style={{padding:"5px 12px",background:"#2e7d32",border:"none",borderRadius:6,fontSize:12,fontWeight:600,color:"#fff",cursor:"pointer"}}>確定</button><button onClick={()=>setShowRestoreConfirm(false)} style={{padding:"5px 12px",background:"#eee",border:"none",borderRadius:6,fontSize:12,color:"#888",cursor:"pointer"}}>取消</button></div>}
        </div>
      </div>

      {/* Pause form */}
      {showPauseForm&&st==="active"&&(<div style={{background:"#fffbf0",borderRadius:8,padding:14,marginBottom:8,border:"1px solid #ffe0b2"}}>
        <div style={{fontSize:13,fontWeight:600,color:"#7d6608",marginBottom:10}}>📝 填寫暫停資訊</div>
        <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:10}}>
          <div style={{flex:"1 1 140px"}}><label style={{fontSize:12,color:"#888",display:"block",marginBottom:4}}>暫停日期</label><input type="date" value={pauseDate} onChange={e=>{setPauseDate(e.target.value);setPauseDose(String(calcDoseFromDate(e.target.value)));}} style={{...is,height:38,fontSize:14}}/></div>
          <div style={{flex:"0 0 120px"}}><label style={{fontSize:12,color:"#888",display:"block",marginBottom:4}}>第幾次後（自動計算）</label><input type="number" min="0" max="19" value={pauseDose} onChange={e=>setPauseDose(e.target.value)} style={{...is,height:38,fontSize:14,width:80}}/></div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>{onPause(p.id,parseInt(pauseDose)||currentDose,pauseDate);setShowPauseForm(false);}} style={{padding:"6px 16px",background:"#f9a825",border:"none",borderRadius:6,fontSize:13,fontWeight:600,color:"#fff",cursor:"pointer"}}>確認暫停</button>
          <button onClick={()=>setShowPauseForm(false)} style={{padding:"6px 16px",background:"#eee",border:"none",borderRadius:6,fontSize:13,color:"#888",cursor:"pointer"}}>取消</button>
        </div>
      </div>)}

      {/* Complete form */}
      {showCompleteForm&&st==="active"&&(<div style={{background:"#e8f5e9",borderRadius:8,padding:14,marginBottom:8,border:"1px solid #a5d6a7"}}>
        <div style={{fontSize:13,fontWeight:600,color:"#2e7d32",marginBottom:10}}>✅ 填寫清除完成資訊</div>
        <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:10}}>
          <div style={{flex:"1 1 140px"}}><label style={{fontSize:12,color:"#888",display:"block",marginBottom:4}}>清除確認日期</label><input type="date" value={completeDate} onChange={e=>{setCompleteDate(e.target.value);setCompleteDose(String(calcDoseFromDate(e.target.value)));}} style={{...is,height:38,fontSize:14}}/></div>
          <div style={{flex:"0 0 120px"}}><label style={{fontSize:12,color:"#888",display:"block",marginBottom:4}}>第幾次後（自動計算）</label><input type="number" min="1" max="19" value={completeDose} onChange={e=>setCompleteDose(e.target.value)} style={{...is,height:38,fontSize:14,width:80}}/></div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>{onComplete(p.id,parseInt(completeDose)||currentDose,completeDate);setShowCompleteForm(false);}} style={{padding:"6px 16px",background:"#2e7d32",border:"none",borderRadius:6,fontSize:13,fontWeight:600,color:"#fff",cursor:"pointer"}}>確認完成</button>
          <button onClick={()=>setShowCompleteForm(false)} style={{padding:"6px 16px",background:"#eee",border:"none",borderRadius:6,fontSize:13,color:"#888",cursor:"pointer"}}>取消</button>
        </div>
      </div>)}

      {/* Resume form */}
      {showResume&&st==="paused"&&(<div style={{background:"#e8f4fd",borderRadius:8,padding:14,marginBottom:8,border:"1px solid #bbdefb"}}>
        <div style={{fontSize:13,fontWeight:600,color:"#1a5276",marginBottom:10}}>🔄 填寫恢復治療日期</div>
        <div style={{display:"flex",gap:10,alignItems:"end",flexWrap:"wrap"}}>
          <div><label style={{fontSize:12,color:"#888",display:"block",marginBottom:4}}>新治療日期（接續第 {(p.pausedAfterDose||0)+1} 次）</label><input type="date" value={resumeDate} onChange={e=>setResumeDate(e.target.value)} style={{...is,height:38,fontSize:14}}/></div>
          <button onClick={()=>{if(resumeDate){onResume(p.id,resumeDate);setShowResume(false);setResumeDate("");}}} style={{padding:"6px 16px",background:"#2874a6",border:"none",borderRadius:6,fontSize:13,fontWeight:600,color:"#fff",cursor:"pointer",height:38}}>確認恢復</button>
          <button onClick={()=>setShowResume(false)} style={{padding:"6px 16px",background:"#eee",border:"none",borderRadius:6,fontSize:13,color:"#888",cursor:"pointer",height:38}}>取消</button>
        </div>
      </div>)}

      {/* Pause MRI add */}
      {st==="paused"&&(<div style={{background:"#fff3e0",borderRadius:8,padding:14,border:"1px solid #ffe0b2"}}>
        <div style={{fontSize:13,fontWeight:600,color:"#e65100",marginBottom:10}}>🔍 新增暫停期間追蹤 MRI</div>
        <div style={{display:"flex",gap:10,alignItems:"end",flexWrap:"wrap"}}>
          <div><label style={{fontSize:12,color:"#888",display:"block",marginBottom:4}}>MRI 日期</label><input type="date" value={newMRIDate} onChange={e=>setNewMRIDate(e.target.value)} style={{...is,height:38,fontSize:14}}/></div>
          <button onClick={()=>{if(newMRIDate){onAddPauseMRI(p.id,newMRIDate);setNewMRIDate("");showToast("已新增追蹤 MRI","ok");}}} style={{padding:"6px 16px",background:"#e65100",border:"none",borderRadius:6,fontSize:13,fontWeight:600,color:"#fff",cursor:"pointer",height:38}}>新增</button>
        </div>
      </div>)}

      {/* Progress */}
      {events.length>0&&(<div style={{marginTop:10}}>
        <div style={{fontSize:12,fontWeight:600,color:"#888",marginBottom:6}}>治療進度（{st==="completed"&&p.completedAfterDose?`${p.completedAfterDose}/${p.completedAfterDose}`:st==="paused"&&p.pausedAfterDose?`${p.pausedAfterDose}/${infCount}`:`${currentDose}/${infCount}`}）{p.pausedAfterDose?` · 暫停於第 ${p.pausedAfterDose} 次後`:""}{p.pausedDate?` · ${p.pausedDate}`:""}{p.completedAfterDose?` · 完成於第 ${p.completedAfterDose} 次後`:""}{p.completedDate?` · ${p.completedDate}`:""}</div>
        <ProgressBar events={events} status={st} completedAfterDose={p.completedAfterDose} pausedAfterDose={p.pausedAfterDose}/>
        <div style={{fontSize:10,color:"#bbb",marginTop:4}}>● 已完成 ○ 未完成 <span style={{color:"#9c27b0"}}>■ 贈藥</span>（點擊排程表中🎁可切換）</div>
      </div>)}
    </div>

    {/* Input */}
    <div style={{background:"#fff",borderRadius:10,padding:"18px",marginBottom:14,boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
      <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:12}}>
        <div style={{flex:"1 1 100px"}}><label style={{display:"block",fontSize:12,fontWeight:600,color:"#666",marginBottom:5}}>醫院</label><input type="text" value={p.hospital||""} onChange={e=>updatePatient(p.id,{hospital:e.target.value})} style={is}/></div>
        <div style={{flex:"1 1 100px"}}><label style={{display:"block",fontSize:12,fontWeight:600,color:"#666",marginBottom:5}}>HCP</label><input type="text" value={p.hcp||""} onChange={e=>updatePatient(p.id,{hcp:e.target.value})} style={is}/></div>
        <div style={{flex:"0 0 90px"}}><label style={{display:"block",fontSize:12,fontWeight:600,color:"#666",marginBottom:5}}>Case</label><input type="text" value={p.caseNo||""} onChange={e=>updatePatient(p.id,{caseNo:e.target.value})} style={is}/></div>
      </div>
      <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:12}}>
        <div style={{flex:"1 1 140px"}}><label style={{display:"block",fontSize:12,fontWeight:600,color:"#666",marginBottom:5}}>患者姓名</label><input type="text" placeholder="選填" value={p.name} onChange={e=>updatePatient(p.id,{name:e.target.value})} style={is}/></div>
        <div style={{flex:"1 1 140px"}}><label style={{display:"block",fontSize:12,fontWeight:600,color:"#666",marginBottom:5}}>首次治療日 *</label><input type="date" value={p.firstDate} onChange={e=>updatePatient(p.id,{firstDate:e.target.value})} style={is}/></div>
      </div>
      <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:12}}>
        <div style={{flex:"0 0 110px"}}><label style={{display:"block",fontSize:12,fontWeight:600,color:"#666",marginBottom:5}}>MRI 提前天數</label><div style={{display:"flex",alignItems:"center",gap:6}}><input type="number" min="1" max="28" value={p.mriDays} onChange={e=>updatePatient(p.id,{mriDays:e.target.value})} style={{width:60,padding:"9px 8px",border:"1.5px solid #d5d8dc",borderRadius:6,fontSize:15,textAlign:"center",outline:"none",height:44,WebkitAppearance:"none",appearance:"none"}}/><span style={{fontSize:13,color:"#888"}}>天</span></div></div>
        <div style={{flex:"1 1 180px"}}><label style={{display:"block",fontSize:12,fontWeight:600,color:"#666",marginBottom:5}}>備註</label><input type="text" placeholder="選填" value={p.notes||""} onChange={e=>updatePatient(p.id,{notes:e.target.value})} style={is}/></div>
      </div>
      <div style={{marginTop:14,borderTop:"1px solid #f0f0f0",paddingTop:12}}>
        <button onClick={()=>setShowSettings(!showSettings)} style={{background:"none",border:"none",fontSize:12,color:"#999",cursor:"pointer",fontWeight:500}}>{showSettings?"▼":"▶"} ⚙️ 進階設定（Email 提醒）</button>
        {showSettings&&(<div style={{marginTop:10,display:"flex",gap:12,flexWrap:"wrap"}}>
          <div style={{flex:"1 1 200px"}}><label style={{display:"block",fontSize:12,fontWeight:600,color:"#666",marginBottom:5}}>Apps Script URL</label><input type="url" placeholder="https://script.google.com/macros/s/.../exec" value={scriptUrl} onChange={e=>setScriptUrl(e.target.value)} style={{...is,fontSize:13}}/></div>
          <div style={{flex:"1 1 160px"}}><label style={{display:"block",fontSize:12,fontWeight:600,color:"#666",marginBottom:5}}>通知 Email</label><input type="email" placeholder="doctor@hospital.com" value={email} onChange={e=>setEmail(e.target.value)} style={is}/></div>
          {scriptUrl&&email&&<div style={{width:"100%",fontSize:11,color:"#27ae60",fontWeight:500}}>✅ 儲存時自動同步，3天前/1天前/當天寄信至 {email}</div>}
        </div>)}
      </div>
    </div>

    {events.length>0?(<>
      {/* Gift settings panel */}
      <div style={{background:"#fff",borderRadius:10,padding:"12px 18px",marginBottom:14,boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
        <button onClick={()=>setShowGiftPanel(!showGiftPanel)} style={{background:"none",border:"none",fontSize:12,color:"#9c27b0",cursor:"pointer",fontWeight:600}}>{showGiftPanel?"▼":"▶"} 🎁 贈藥設定（點擊展開調整贈藥次數）</button>
        {showGiftPanel&&(<div style={{marginTop:10}}>
          <div style={{fontSize:11,color:"#888",marginBottom:8}}>勾選需要贈藥的輸注次數：</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {events.filter(ev=>ev.type==="infusion").map(ev=>{
              const dn=ev.doseNumber;
              return(<button key={dn} onClick={()=>onToggleGift(p.id,ev.id)} style={{
                padding:"6px 12px",borderRadius:6,fontSize:12,fontWeight:600,cursor:"pointer",minWidth:44,
                border:ev.isGift?"2px solid #9c27b0":"1.5px solid #ddd",
                background:ev.isGift?"#f3e5f5":"#fff",
                color:ev.isGift?"#9c27b0":"#999",
              }}>第{dn}次{ev.isGift?" ✓":""}</button>);
            })}
          </div>
          <div style={{fontSize:11,color:"#9c27b0",marginTop:8}}>目前贈藥：{events.filter(ev=>ev.isGift).map(ev=>`第${ev.doseNumber}次`).join("、")||"無"}</div>
        </div>)}
      </div>

      <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
        {[{val:infCount,unit:"次輸注",color:"#e07800"},{val:mriCount+(pauseMRICount?`+${pauseMRICount}`:""),unit:"次 MRI",color:"#6c3483"},{val:lastEv?formatDateTW(lastEv.date):"—",unit:"最後排程",color:"#1e8449",small:true}].map((c,i)=>(<div key={i} style={{flex:"1 1 90px",background:"#fff",borderRadius:8,padding:"12px 14px",boxShadow:"0 1px 3px rgba(0,0,0,0.05)",borderLeft:`3px solid ${c.color}`}}><div style={{fontSize:c.small?13:22,fontWeight:700,color:c.color}}>{c.val}</div><div style={{fontSize:11,color:"#999"}}>{c.unit}</div></div>))}
      </div>
      <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}>
        <button onClick={handleICS} style={{flex:1,padding:"11px 14px",background:"#FF9224",color:"#fff",border:"none",borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer",minWidth:140}}>📅 下載日曆檔</button>
        <button onClick={handleXLSX} style={{flex:1,padding:"11px 14px",background:"#1e8449",color:"#fff",border:"none",borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer",minWidth:140}}>📊 下載 Excel</button>
      </div>
      <div style={{display:"flex",marginBottom:10,background:"#e5e8eb",borderRadius:8,padding:3,flexWrap:"wrap"}}>
        {[{key:"all",label:`全部(${events.length})`},{key:"infusion",label:`輸注(${infCount})`},{key:"mri",label:`MRI(${mriCount})`},...(pauseMRICount?[{key:"pauseMRI",label:`追蹤(${pauseMRICount})`}]:[])].map(t=>(<button key={t.key} onClick={()=>updatePatient(p.id,{filter:t.key})} style={{flex:1,padding:"7px 8px",border:"none",borderRadius:6,fontSize:12,fontWeight:p.filter===t.key?700:400,background:p.filter===t.key?"#fff":"transparent",color:p.filter===t.key?"#e07800":"#777",cursor:"pointer"}}>{t.label}</button>))}
      </div>
      <div style={{background:"#fff",borderRadius:10,overflow:"hidden",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
        <div style={{display:"flex",padding:"9px 14px",background:"#f0f2f5",fontSize:11,fontWeight:600,color:"#888",borderBottom:"1px solid #e8eaed"}}><div style={{flex:1}}>週次</div><div style={{flex:2}}>日期</div><div style={{flex:1,textAlign:"center"}}>類型</div><div style={{flex:2}}>項目</div></div>
        {filtered.map((ev,i)=>{
          const isPast=ev.date<new Date();const isToday=formatDate(ev.date)===formatDate(new Date());
          return(<div key={ev.id}>
            <div style={{display:"flex",alignItems:"center",padding:"8px 14px",borderBottom:ev.giftRemind&&!isPast?"none":(i<filtered.length-1?"1px solid #f2f3f5":"none"),opacity:isPast&&!isToday?0.45:1,background:ev.isPauseMRI?"#fff8f0":isToday?"#fffde7":ev.edited?"#fff8f0":"transparent",fontSize:13}}>
              <div style={{flex:1,fontWeight:600,color:"#aaa",fontSize:11}}>{ev.week||"—"}</div>
              <div style={{flex:2}}><div className="date-cell"><span className="date-text" style={{color:ev.edited?"#e07800":"#333"}}>{formatDateTW(ev.date)}</span><div className="date-btn" title="修改日期">📅<input type="date" value={formatDate(ev.date)} onChange={e=>e.target.value&&updateEventDate(p.id,ev.id,e.target.value)}/></div></div></div>
              <div style={{flex:1,textAlign:"center"}}><Badge type={ev.type} pause={ev.isPauseMRI}/></div>
              <div style={{flex:2,paddingLeft:6}}>
                <div style={{fontWeight:500,fontSize:12,display:"flex",alignItems:"center",gap:4,flexWrap:"wrap"}}>
                  {ev.isPauseMRI?"追蹤 MRI（暫停期間）":ev.label}
                  {ev.isGift&&<span style={{padding:"1px 6px",borderRadius:4,fontSize:10,fontWeight:700,background:"#9c27b0",color:"#fff"}}>🎁 贈藥</span>}
                  {ev.edited&&<span style={{fontSize:10,color:"#e07800"}}>✎</span>}
                </div>
              </div>
            </div>
            {ev.giftRemind&&!isPast&&(<div style={{padding:"4px 14px 8px",fontSize:11,color:"#9c27b0",fontWeight:500,background:"#faf0ff",borderBottom:i<filtered.length-1?"1px solid #f2f3f5":"none"}}>{ev.giftRemind}</div>)}
          </div>);
        })}
      </div>
      <div style={{marginTop:14,padding:"11px 14px",background:"#fef9e7",borderRadius:8,fontSize:11,color:"#7d6608",lineHeight:1.7}}>⚠️ 排程為標準建議時程，依醫師評估調整。MRI 遇週末自動提前至週五。<br/>📅 點日期旁圖示可調整 &nbsp; 🎁 展開「贈藥設定」可調整贈藥次數</div>
    </>):(<div style={{textAlign:"center",padding:"50px 20px",color:"#bbb"}}><div style={{fontSize:36,marginBottom:10}}>📅</div><div style={{fontSize:14}}>請輸入首次治療日以產生排程</div></div>)}
  </div>);
}

// ============ MAIN APP ============
function App(){
  const[patients,setPatients]=useState([createPatient(1)]);
  const[nextId,setNextId]=useState(2);
  const[page,setPage]=useState("schedule");
  const[activeId,setActiveId]=useState(1);
  const[scriptUrl,setScriptUrl]=useState("");
  const[email,setEmail]=useState("");
  const[toast,setToast]=useState({show:false,msg:"",type:"ok"});
  const fileRef=useRef(null);
  const showToast=useCallback((msg,type="ok")=>{setToast({show:true,msg,type});setTimeout(()=>setToast(t=>({...t,show:false})),3000);},[]);

  const updatePatient=useCallback((id,updates)=>{setPatients(prev=>prev.map(p=>{if(p.id!==id)return p;const u={...p,...updates};if(('firstDate' in updates||'mriDays' in updates)&&u.firstDate){const giftSet=new Set(p.events.filter(e=>e.isGift).map(e=>e.doseNumber).filter(Boolean));u.events=generateSchedule(u.firstDate,u.mriDays,1,19,giftSet.size?giftSet:null);}return u;}));},[]);
  const updateEventDate=useCallback((pid,eid,ds)=>{setPatients(prev=>prev.map(p=>{if(p.id!==pid)return p;return{...p,events:p.events.map(ev=>ev.id!==eid?ev:{...ev,date:new Date(ds+"T00:00:00"),edited:true}).sort((a,b)=>a.date-b.date)};}));},[]);

  const addPatient=()=>{setPatients(prev=>[...prev,createPatient(nextId)]);setActiveId(nextId);setNextId(n=>n+1);setPage("schedule");};
  const removePatient=(id)=>{if(patients.length<=1)return;const rem=patients.filter(p=>p.id!==id);setPatients(rem);if(activeId===id)setActiveId(rem[0].id);setPage("overview");showToast("已刪除","ok");};
  const selectPatient=(id)=>{setActiveId(id);setPage("schedule");};

  const handlePause=(id,afterDose,pDate)=>{
    setPatients(prev=>prev.map(p=>{
      if(p.id!==id)return p;
      // Keep only completed events (dose <= afterDose) and their MRIs
      const kept=p.events.filter(ev=>{
        if(ev.isPauseMRI)return true;
        if(ev.type==="infusion")return ev.doseNumber<=afterDose;
        if(ev.type==="mri"&&ev.doseRef)return ev.doseRef<=afterDose;
        return false;
      });
      return{...p,status:"paused",pausedAfterDose:afterDose,pausedDate:pDate,events:kept.sort((a,b)=>a.date-b.date)};
    }));
    showToast(`🟡 已暫停（第 ${afterDose} 次後，${pDate}），後續排程已清除`,"ok");
  };
  const handleResume=(id,newDate)=>{
    setPatients(prev=>prev.map(p=>{
      if(p.id!==id)return p;
      const rd=(p.pausedAfterDose||0)+1,rem=19-rd+1;
      if(rem<=0)return{...p,status:"completed",pausedAfterDose:null,pausedDate:null};
      // preserve gift settings
      const giftSet=new Set(p.events.filter(e=>e.isGift&&e.doseNumber).map(e=>e.doseNumber));
      const newEvs=generateSchedule(newDate,p.mriDays,rd,rem,giftSet.size?giftSet:null);
      const kept=p.events.filter(ev=>{
        if(ev.isPauseMRI)return true;
        if(ev.type==="infusion")return ev.doseNumber<rd;
        if(ev.type==="mri"&&ev.doseRef)return ev.doseRef<rd;
        return false;
      });
      return{...p,status:"active",pausedAfterDose:null,pausedDate:null,events:[...kept,...newEvs].sort((a,b)=>a.date-b.date)};
    }));showToast("🔄 已恢復用藥，排程已更新","ok");
  };
  const handleComplete=(id,afterDose,cDate)=>{updatePatient(id,{status:"completed",completedAfterDose:afterDose||null,completedDate:cDate||null});showToast(`✅ 清除完成（第 ${afterDose} 次後，${cDate}）`,"ok");};
  const handleUndoPause=(id)=>{
    setPatients(prev=>prev.map(p=>{
      if(p.id!==id||!p.firstDate)return p;
      const giftSet=new Set(p.events.filter(e=>e.isGift&&e.doseNumber).map(e=>e.doseNumber));
      const newEvents=generateSchedule(p.firstDate,p.mriDays,1,19,giftSet.size?giftSet:null);
      return{...p,status:"active",pausedAfterDose:null,pausedDate:null,events:newEvents};
    }));showToast("↩ 已撤銷暫停，排程已重建","ok");
  };
  const handleToggleGift=(pid,eid)=>{setPatients(prev=>prev.map(p=>{if(p.id!==pid)return p;return{...p,events:p.events.map(ev=>ev.id!==eid?ev:{...ev,isGift:!ev.isGift})};}));};
  const handleAddPauseMRI=(pid,dateStr)=>{
    setPatients(prev=>prev.map(p=>{
      if(p.id!==pid)return p;
      const mriId=`pmri-${Date.now()}`;
      const newMRI={id:mriId,type:"mri",label:"追蹤 MRI（暫停期間）",week:"—",date:new Date(dateStr+"T00:00:00"),startHour:9,startMin:0,endHour:11,endMin:0,doseRef:null,doseNumber:null,edited:false,isGift:false,giftRemind:"",isPauseMRI:true};
      return{...p,events:[...p.events,newMRI].sort((a,b)=>a.date-b.date)};
    }));
  };

  const handleSaveJSON=async()=>{
    const valid=patients.filter(p=>p.firstDate);if(!valid.length){showToast("❌ 無資料可匯出","err");return;}
    dlFile(serializeData(patients,scriptUrl,email),`Kisunla_patients_${formatDate(new Date())}.json`,"application/octet-stream");
    if(scriptUrl&&email){await postAllToSheet(scriptUrl,email,patients);showToast("✅ JSON 已儲存，已同步 Google Sheet","ok");}
    else showToast("✅ JSON 已儲存","ok");
  };
  const handleExportExcel=()=>{
    const valid=patients.filter(p=>p.firstDate);if(!valid.length){showToast("❌ 無資料可匯出","err");return;}
    XLSX.writeFile(genAllPatientsExcel(patients),`Kisunla_全患者總表_${formatDate(new Date())}.xlsx`);
    showToast("✅ Excel 總表已下載","ok");
  };
  const handleImport=(e)=>{const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=(ev)=>{try{const data=deserializeData(ev.target.result);setPatients(data.patients);if(data.scriptUrl)setScriptUrl(data.scriptUrl);if(data.email)setEmail(data.email);setActiveId(data.patients[0].id);setNextId(Math.max(...data.patients.map(p=>p.id))+1);showToast(`✅ 已匯入 ${data.patients.filter(p=>p.firstDate).length} 位患者`,"ok");}catch(err){showToast("❌ 檔案格式錯誤","err");}};reader.readAsText(file);e.target.value="";};

  const active=patients.find(p=>p.id===activeId)||patients[0];

  return(<div style={{minHeight:"100vh",background:"#f5f6f8"}}>
    <div style={{background:"linear-gradient(135deg, #e07800 0%, #FF9224 100%)",color:"#fff",padding:"24px 20px 16px"}}>
      <div style={{maxWidth:700,margin:"0 auto"}}>
        <div style={{fontSize:11,letterSpacing:2,opacity:.6,marginBottom:2}}>KISUNLA™ (DONANEMAB-AZBT)</div>
        <h1 style={{margin:0,fontSize:20,fontWeight:700}}>欣智樂 治療排程產生器</h1>
        <p style={{margin:"4px 0 0",fontSize:12,opacity:.85}}>Q4W 輸注 × 19 次 ｜ MRI 於第 2、3、4、7 次輸注前（自訂天數，避開週末）</p>
        <div style={{display:"flex",gap:4,marginTop:14}}>
          {[{key:"overview",label:"📋 患者總覽"},{key:"schedule",label:"📅 排程編輯"},{key:"guide",label:"📖 操作指南"}].map(t=>(<button key={t.key} onClick={()=>setPage(t.key)} style={{padding:"6px 16px",border:"none",borderRadius:"6px 6px 0 0",fontSize:13,fontWeight:page===t.key?700:400,cursor:"pointer",background:page===t.key?"#f5f6f8":"rgba(255,255,255,0.15)",color:page===t.key?"#e07800":"rgba(255,255,255,0.8)"}}>{t.label}</button>))}
        </div>
      </div>
    </div>
    {page==="guide"&&<GuidePage/>}
    {page==="overview"&&<OverviewPage patients={patients} onSelect={selectPatient} onAdd={addPatient} onSaveJSON={handleSaveJSON} onExportExcel={handleExportExcel} onImport={handleImport} fileRef={fileRef}/>}
    {page==="schedule"&&(<>
      <div style={{background:"#fff",borderBottom:"1px solid #eee",padding:"10px 14px",display:"flex",alignItems:"center",gap:8}}>
        <button onClick={addPatient} style={{padding:"5px 12px",background:"#FF9224",color:"#fff",border:"none",borderRadius:20,fontSize:12,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>+ 新增</button>
        <div style={{display:"flex",alignItems:"center",gap:6,overflowX:"auto",flex:1}}>
          {[...patients].sort((a,b)=>(a.firstDate||"").localeCompare(b.firstDate||"")).map((p,idx)=>(<button key={p.id} onClick={()=>setActiveId(p.id)} style={{padding:"5px 12px",border:activeId===p.id?"2px solid #FF9224":"1.5px solid #ddd",borderRadius:20,fontSize:12,fontWeight:activeId===p.id?700:400,background:activeId===p.id?"#fff8f0":"#fff",color:activeId===p.id?"#e07800":"#888",cursor:"pointer",whiteSpace:"nowrap"}}>{p.hcp?`${p.hcp} `:""}{p.caseNo||p.name||`患者 ${idx+1}`}</button>))}
        </div>
      </div>
      <SchedulePage patient={active} updatePatient={updatePatient} updateEventDate={updateEventDate} onBack={()=>setPage("overview")} onRemove={removePatient} canRemove={patients.length>1} scriptUrl={scriptUrl} email={email} setScriptUrl={setScriptUrl} setEmail={setEmail} showToast={showToast} onPause={handlePause} onResume={handleResume} onComplete={handleComplete} onToggleGift={handleToggleGift} onAddPauseMRI={handleAddPauseMRI} onUndoPause={handleUndoPause}/>
    </>)}
    <Toast msg={toast.msg} type={toast.type} show={toast.show}/>
  </div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
